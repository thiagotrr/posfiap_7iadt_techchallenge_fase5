[pytest]
markers =
    integration: requires a running Neo4j instance
# asyncio (routers async da orquestração, Dev 3 Épico 4).
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
# models/vision-detector/tests fica de fora do `pytest` da raiz: precisa de
# torch/opencv/ultralytics (não são dependências do requirements.txt raiz,
# de propósito -- ver docker-compose.yml). Roda dentro do próprio container:
# docker compose run --rm vision-detector pytest
testpaths =
    tests
    extraction/tests
